name: projects-dashboard

networks:
  traefik-public:
    external: true

services:
  api:
    build:
      context: /opt/projects-dashboard
      dockerfile: /opt/projects-dashboard/Dockerfile.api
    image: projects-dashboard-api:local
    container_name: projects-dashboard-api
    restart: unless-stopped
    environment:
      PORT: "3000"
      NODE_ENV: production
      FRONTEND_URL: https://app.projects.dotai.online
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.projects-api.rule=Host(`api.projects.dotai.online`)
      - traefik.http.routers.projects-api.entrypoints=websecure
      - traefik.http.routers.projects-api.tls.certresolver=letsencrypt
      - traefik.http.services.projects-api.loadbalancer.server.port=3000

  web:
    build:
      context: /opt/projects-dashboard
      dockerfile: /opt/projects-dashboard/Dockerfile.web
      args:
        VITE_API_URL: https://api.projects.dotai.online
    image: projects-dashboard-web:local
    container_name: projects-dashboard-web
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      # Distinct router name avoids clashes with other stacks on the same Traefik (was projects-app).
      - traefik.http.routers.projects-dashboard-web.rule=Host(`app.projects.dotai.online`)
      - traefik.http.routers.projects-dashboard-web.entrypoints=websecure
      - traefik.http.routers.projects-dashboard-web.tls=true
      - traefik.http.routers.projects-dashboard-web.tls.certresolver=letsencrypt
      - "traefik.http.routers.projects-dashboard-web.tls.domains[0].main=app.projects.dotai.online"
      - traefik.http.services.projects-dashboard-web.loadbalancer.server.port=80
      # HTTP entrypoint: redirect to HTTPS (Traefik still serves ACME HTTP-01 before this applies).
      - traefik.http.middlewares.projects-dashboard-web-https.redirectscheme.scheme=https
      - traefik.http.middlewares.projects-dashboard-web-https.redirectscheme.permanent=true
      - traefik.http.routers.projects-dashboard-web-http.rule=Host(`app.projects.dotai.online`)
      - traefik.http.routers.projects-dashboard-web-http.entrypoints=web
      - traefik.http.routers.projects-dashboard-web-http.middlewares=projects-dashboard-web-https
      - traefik.http.routers.projects-dashboard-web-http.service=projects-dashboard-web
